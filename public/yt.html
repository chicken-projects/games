<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    h1 svg { width: 28px; height: 28px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 13px; color: #a1a1aa; margin-bottom: 6px; }
    .input-row { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #27272a; background: #18181b; color: #e5e5e5; font-size: 14px; outline: none; }
    input:focus { border-color: #3b82f6; }
    button { padding: 10px 20px; border-radius: 8px; border: none; background: #3b82f6; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    button:hover { background: #2563eb; }
    .player-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #000; border-radius: 12px; overflow: hidden; margin-top: 20px; }
    .player-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .player-wrap.empty { display: flex; align-items: center; justify-content: center; }
    .player-wrap.empty::after { content: 'Paste a YouTube link or search above'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #52525b; font-size: 14px; }
    .search-results { margin-top: 16px; }
    .search-results iframe { width: 100%; height: 500px; border: none; border-radius: 12px; background: #000; }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab { padding: 8px 16px; border-radius: 8px; border: 1px solid #27272a; background: transparent; color: #a1a1aa; font-size: 13px; font-weight: 500; cursor: pointer; }
    .tab.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <svg viewBox="0 0 24 24" fill="#ff0000"><path d="M23.5 6.2a3 3 0 00-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 00.5 6.2 31.4 31.4 0 000 12a31.4 31.4 0 00.5 5.8 3 3 0 002.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 002.1-2.1A31.4 31.4 0 0024 12a31.4 31.4 0 00-.5-5.8zM9.5 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
      YouTube
    </h1>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('link')">Paste Link</button>
      <button class="tab" onclick="switchTab('search')">Search</button>
    </div>

    <div id="linkTab">
      <div class="input-group">
        <label>Paste a YouTube URL</label>
        <div class="input-row">
          <input id="urlInput" type="text" placeholder="https://www.youtube.com/watch?v=..." oninput="tryAutoEmbed()">
          <button onclick="embedFromUrl()">Embed</button>
        </div>
      </div>
      <div id="player" class="player-wrap empty"></div>
    </div>

    <div id="searchTab" style="display:none">
      <div class="input-group">
        <label>Search YouTube</label>
        <div class="input-row">
          <input id="searchInput" type="text" placeholder="Search videos..." onkeydown="if(event.key==='Enter')doSearch()">
          <button onclick="doSearch()">Search</button>
        </div>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.getElementById('linkTab').style.display = tab === 'link' ? '' : 'none';
      document.getElementById('searchTab').style.display = tab === 'search' ? '' : 'none';
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'link') || (i === 1 && tab === 'search'));
      });
    }

    function extractVideoId(url) {
      if (!url) return null;
      let m = url.match(/(?:youtube\.com\/watch\?.*v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function embedVideo(videoId) {
      const player = document.getElementById('player');
      player.classList.remove('empty');
      player.innerHTML = '<iframe src="https://www.youtube.com/embed/' + videoId + '?autoplay=1" allowfullscreen allow="autoplay; encrypted-media"></iframe>';
    }

    function embedFromUrl() {
      const url = document.getElementById('urlInput').value.trim();
      const id = extractVideoId(url);
      if (id) embedVideo(id);
    }

    function tryAutoEmbed() {
      const url = document.getElementById('urlInput').value.trim();
      const id = extractVideoId(url);
      if (id) embedVideo(id);
    }

    function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      const container = document.getElementById('searchResults');
      container.innerHTML = '<iframe src="https://www.youtube.com/results?search_query=' + encodeURIComponent(q) + '"></iframe>';
    }

    // Handle opening in about:blank if available
    if (window.parent && window.parent.__openInAboutBlank) {
      // We're inside about:blank, game links should use the parent's function
    }
  </script>
</body>
</html>
